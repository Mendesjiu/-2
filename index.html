<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍅 番茄时钟 - 专注工作</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --card-bg: #ffffff;
            --text: #3e3640;
            --text-secondary: #8b7f8e;
            --accent: #e85d4a;
            --accent-soft: #fde8e4;
            --ring-bg: #f0e8e0;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.12);
            --border: #e8e0d8;
            --btn-hover: #fdf0ed;
            --task-done: #c4b8a8;
            --gradient: linear-gradient(135deg, #e85d4a, #d44a3a);
            --timer-shadow: 0 0 60px rgba(232, 93, 74, 0.25);
            --mode-bg: #faf7f3;
        }

        [data-theme="dark"] {
            --bg: #1a1a1e;
            --card-bg: #252528;
            --text: #e8e3e0;
            --text-secondary: #a09895;
            --accent: #f0715c;
            --accent-soft: #3a2020;
            --ring-bg: #333035;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
            --border: #3a3538;
            --btn-hover: #3a2825;
            --task-done: #5a5550;
            --gradient: linear-gradient(135deg, #f0715c, #d95545);
            --timer-shadow: 0 0 70px rgba(240, 113, 92, 0.35);
            --mode-bg: #2a282c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease, color 0.5s ease;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(232, 93, 74, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 130, 100, 0.03) 0%, transparent 60%);
        }

        [data-theme="dark"] body {
            background-image: radial-gradient(ellipse at 50% 30%, rgba(240, 113, 92, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 80% 70%, rgba(180, 130, 100, 0.04) 0%, transparent 60%);
        }

        .app-container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 顶部栏 */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }
        .app-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .app-title .icon {
            font-size: 1.6rem;
        }
        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--text);
            box-shadow: var(--shadow);
        }
        .theme-toggle:hover {
            transform: scale(1.06);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        /* 主卡片 */
        .main-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 36px 28px 32px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.5s ease;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: var(--accent);
            opacity: 0.03;
            border-radius: 50%;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* 模式切换标签 */
        .mode-tabs {
            display: flex;
            gap: 6px;
            background: var(--mode-bg);
            border-radius: 20px;
            padding: 5px;
        }
        .mode-tab {
            padding: 10px 18px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
        }
        .mode-tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px rgba(232, 93, 74, 0.3);
            font-weight: 700;
        }
        .mode-tab:hover:not(.active) {
            color: var(--text);
            background: rgba(0, 0, 0, 0.04);
        }
        [data-theme="dark"] .mode-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
        }

        /* 计时器环 */
        .timer-ring-container {
            position: relative;
            width: 240px;
            height: 240px;
            flex-shrink: 0;
        }
        .timer-ring {
            transform: rotate(-90deg);
            width: 240px;
            height: 240px;
        }
        .ring-bg {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 10;
        }
        .ring-progress {
            fill: none;
            stroke: url(#ringGradient);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.4s linear;
        }
        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', 'Menlo', 'PingFang SC', monospace;
            transition: color 0.3s ease;
        }
        .timer-text.break-mode {
            color: #4a9e6e;
        }
        [data-theme="dark"] .timer-text.break-mode {
            color: #5dbe82;
        }
        .timer-label {
            position: absolute;
            top: 62%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            font-weight: 500;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* 按钮 */
        .btn-row {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .btn {
            padding: 12px 26px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: var(--timer-shadow);
            font-size: 1.05rem;
            padding: 14px 36px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(232, 93, 74, 0.4);
            filter: brightness(1.05);
        }
        .btn-primary:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
        .btn-secondary {
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 10px 20px;
        }
        .btn-secondary:hover {
            background: var(--btn-hover);
            border-color: var(--accent);
        }
        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        /* 设置区 */
        .settings-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }
        .setting-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--mode-bg);
            border-radius: 20px;
            padding: 6px 10px 6px 14px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .setting-group input {
            width: 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px 4px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--card-bg);
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .setting-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        /* 统计区 */
        .stats-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.5s ease;
        }
        .stats-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }
        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            flex: 1;
            min-width: 60px;
            text-align: center;
            background: var(--mode-bg);
            border-radius: 14px;
            padding: 12px 10px;
            transition: all 0.3s ease;
        }
        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .stat-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        /* 任务区 */
        .tasks-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.5s ease;
        }
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .tasks-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .task-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .task-input {
            flex: 1;
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 10px 16px;
            font-size: 0.9rem;
            background: var(--mode-bg);
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .task-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .task-add-btn {
            border-radius: 14px;
            padding: 10px 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .task-add-btn:hover {
            filter: brightness(1.08);
            box-shadow: 0 4px 14px rgba(232, 93, 74, 0.3);
        }
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .task-list::-webkit-scrollbar {
            width: 4px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--mode-bg);
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .task-item.done .task-text {
            text-decoration: line-through;
            color: var(--task-done);
        }
        .task-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.65rem;
            color: transparent;
            background: var(--card-bg);
        }
        .task-item.done .task-check {
            background: #4a9e6e;
            border-color: #4a9e6e;
            color: #fff;
        }
        .task-text {
            flex: 1;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .task-delete {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            opacity: 0;
        }
        .task-item:hover .task-delete {
            opacity: 1;
        }
        .task-delete:hover {
            color: var(--accent);
            background: var(--accent-soft);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #3e3640;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        [data-theme="dark"] .toast {
            background: #f0e8e0;
            color: #3e3640;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .app-container {
                gap: 16px;
            }
            .main-card {
                padding: 24px 16px 20px;
                border-radius: 22px;
            }
            .timer-ring-container {
                width: 180px;
                height: 180px;
            }
            .timer-ring {
                width: 180px;
                height: 180px;
            }
            .timer-text {
                font-size: 3rem;
            }
            .btn-primary {
                padding: 12px 28px;
                font-size: 0.95rem;
            }
            .mode-tab {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            .stats-row {
                gap: 8px;
            }
            .stat-item {
                padding: 8px 6px;
            }
            .stat-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 顶部 -->
        <div class="top-bar">
            <div class="app-title">
                <span class="icon">🍅</span> 番茄时钟
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换暗色/亮色主题">
                🌙
            </button>
        </div>

        <!-- 主卡片 -->
        <div class="main-card" id="mainCard">
            <!-- 模式标签 -->
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="work">🍅 专注</button>
                <button class="mode-tab" data-mode="shortBreak">☕ 短休息</button>
                <button class="mode-tab" data-mode="longBreak">🌿 长休息</button>
            </div>

            <!-- 计时器 -->
            <div class="timer-ring-container">
                <svg class="timer-ring" viewBox="0 0 240 240">
                    <defs>
                        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#e85d4a" />
                            <stop offset="100%" stop-color="#f28b78" />
                        </linearGradient>
                        <linearGradient id="ringGradientBreak" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4a9e6e" />
                            <stop offset="100%" stop-color="#6dc58b" />
                        </linearGradient>
                    </defs>
                    <circle class="ring-bg" cx="120" cy="120" r="108" />
                    <circle class="ring-progress" id="ringProgress" cx="120" cy="120" r="108"
                    stroke-dasharray="678.584"
                    stroke-dashoffset="0" />
                </svg>
                <div class="timer-text" id="timerDisplay">25:00</div>
                <div class="timer-label" id="timerLabel">专注时间</div>
            </div>

            <!-- 按钮 -->
            <div class="btn-row">
                <button class="btn btn-secondary btn-icon" id="btnReset" title="重置">↺</button>
                <button class="btn btn-primary" id="btnStart">
                    ▶ 开始专注
                </button>
                <button class="btn btn-secondary btn-icon" id="btnSkip" title="跳过">⏭</button>
            </div>

            <!-- 时长设置 -->
            <div class="settings-row">
                <div class="setting-group">
                    🍅 专注 <input type="number" id="workMinutes" value="25" min="1" max="60"> 分钟
                </div>
                <div class="setting-group">
                    ☕ 短休 <input type="number" id="shortBreakMinutes" value="5" min="1" max="30"> 分钟
                </div>
                <div class="setting-group">
                    🌿 长休 <input type="number" id="longBreakMinutes" value="15" min="1" max="60"> 分钟
                </div>
            </div>
        </div>

        <!-- 统计 -->
        <div class="stats-card">
            <div class="stats-title">📊 今日统计</div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="pomodorosDone">0</div>
                    <div class="stat-label">完成番茄</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalFocusTime">0分钟</div>
                    <div class="stat-label">总专注时长</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="streakCount">0</div>
                    <div class="stat-label">连续天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sessionsToday">0</div>
                    <div class="stat-label">今日会话</div>
                </div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="tasks-card">
            <div class="tasks-header">
                <span class="tasks-title">📝 待办任务</span>
                <span style="font-size:0.75rem;color:var(--text-secondary);" id="taskCount">0个待完成</span>
            </div>
            <div class="task-input-row">
                <input type="text" class="task-input" id="taskInput" placeholder="添加一个任务..." maxlength="80">
                <button class="task-add-btn" id="btnAddTask">+ 添加</button>
            </div>
            <ul class="task-list" id="taskList"></ul>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const timerDisplay = document.getElementById('timerDisplay');
            const timerLabel = document.getElementById('timerLabel');
            const ringProgress = document.getElementById('ringProgress');
            const btnStart = document.getElementById('btnStart');
            const btnReset = document.getElementById('btnReset');
            const btnSkip = document.getElementById('btnSkip');
            const btnAddTask = document.getElementById('btnAddTask');
            const taskInput = document.getElementById('taskInput');
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');
            const toast = document.getElementById('toast');
            const themeToggle = document.getElementById('themeToggle');
            const modeTabs = document.querySelectorAll('.mode-tab');
            const workInput = document.getElementById('workMinutes');
            const shortBreakInput = document.getElementById('shortBreakMinutes');
            const longBreakInput = document.getElementById('longBreakMinutes');
            const pomodorosDoneEl = document.getElementById('pomodorosDone');
            const totalFocusTimeEl = document.getElementById('totalFocusTime');
            const streakCountEl = document.getElementById('streakCount');
            const sessionsTodayEl = document.getElementById('sessionsToday');

            // ============ 状态 ============
            const CIRCUMFERENCE = 2 * Math.PI * 108; // ~678.584
            ringProgress.style.strokeDasharray = CIRCUMFERENCE;
            ringProgress.style.strokeDashoffset = '0';

            let currentMode = 'work'; // 'work' | 'shortBreak' | 'longBreak'
            let timeLeft = 25 * 60; // 秒
            let totalSeconds = 25 * 60;
            let isRunning = false;
            let timerInterval = null;
            let pomodorosToday = 0;
            let totalFocusSeconds = 0;
            let sessionsTodayCount = 0;
            let streakDays = 0;
            let lastActiveDate = null;

            // 音频上下文
            let audioCtx = null;

            // ============ 初始化 ============
            function init() {
                loadFromStorage();
                updateDisplay();
                updateRing();
                updateStatsUI();
                renderTasks();
                updateTaskCount();
                applyThemeFromStorage();
                ringProgress.style.stroke = 'url(#ringGradient)';
            }

            function loadFromStorage() {
                try {
                    const saved = JSON.parse(localStorage.getItem('pomodoroAppData') || '{}');
                    pomodorosToday = saved.pomodorosToday || 0;
                    totalFocusSeconds = saved.totalFocusSeconds || 0;
                    sessionsTodayCount = saved.sessionsTodayCount || 0;
                    streakDays = saved.streakDays || 0;
                    lastActiveDate = saved.lastActiveDate || null;
                    workInput.value = saved.workMinutes || 25;
                    shortBreakInput.value = saved.shortBreakMinutes || 5;
                    longBreakInput.value = saved.longBreakMinutes || 15;
                    // 检查日期
                    const today = getDateString();
                    if (lastActiveDate && lastActiveDate !== today) {
                        const yesterday = getDateString(new Date(Date.now() - 86400000));
                        if (lastActiveDate === yesterday) {
                            streakDays += 1;
                        } else if (lastActiveDate !== today) {
                            streakDays = 0;
                        }
                        pomodorosToday = 0;
                        totalFocusSeconds = 0;
                        sessionsTodayCount = 0;
                        lastActiveDate = today;
                    } else if (!lastActiveDate) {
                        lastActiveDate = today;
                        streakDays = 1;
                    }
                    timeLeft = (parseInt(workInput.value) || 25) * 60;
                    totalSeconds = timeLeft;
                    currentMode = 'work';
                    saveToStorage();
                } catch (e) {
                    console.log('加载数据失败，使用默认设置');
                    timeLeft = 25 * 60;
                    totalSeconds = timeLeft;
                }
            }

            function saveToStorage() {
                try {
                    const data = {
                        pomodorosToday,
                        totalFocusSeconds,
                        sessionsTodayCount,
                        streakDays,
                        lastActiveDate: lastActiveDate || getDateString(),
                        workMinutes: parseInt(workInput.value) || 25,
                        shortBreakMinutes: parseInt(shortBreakInput.value) || 5,
                        longBreakMinutes: parseInt(longBreakInput.value) || 15,
                        tasks: getTasksData(),
                    };
                    localStorage.setItem('pomodoroAppData', JSON.stringify(data));
                } catch (e) {
                    console.log('保存失败');
                }
            }

            function getDateString(date = new Date()) {
                return date.toISOString().split('T')[0];
            }

            // ============ 任务管理 ============
            function getTasksData() {
                const items = taskList.querySelectorAll('.task-item');
                const tasks = [];
                items.forEach(item => {
                    tasks.push({
                        text: item.querySelector('.task-text').textContent,
                        done: item.classList.contains('done'),
                    });
                });
                return tasks;
            }

            function renderTasks() {
                try {
                    const saved = JSON.parse(localStorage.getItem('pomodoroAppData') || '{}');
                    const tasks = saved.tasks || [];
                    taskList.innerHTML = '';
                    tasks.forEach((task, index) => {
                        const li = createTaskElement(task.text, task.done);
                        taskList.appendChild(li);
                    });
                } catch (e) {
                    taskList.innerHTML = '';
                }
            }

            function createTaskElement(text, done = false) {
                const li = document.createElement('li');
                li.className = 'task-item' + (done ? ' done' : '');
                li.innerHTML = `
                    <span class="task-check">✓</span>
                    <span class="task-text">${escapeHtml(text)}</span>
                    <button class="task-delete" title="删除">✕</button>
                `;
                // 点击勾选
                li.querySelector('.task-check').addEventListener('click', () => toggleTask(li));
                li.querySelector('.task-text').addEventListener('click', () => toggleTask(li));
                li.querySelector('.task-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    li.style.transform = 'translateX(40px)';
                    li.style.opacity = '0';
                    li.style.transition = 'all 0.3s ease';
                    setTimeout(() => {
                        li.remove();
                        updateTaskCount();
                        saveToStorage();
                    }, 300);
                });
                return li;
            }

            function toggleTask(li) {
                li.classList.toggle('done');
                updateTaskCount();
                saveToStorage();
                if (li.classList.contains('done')) {
                    playTickSound();
                }
            }

            function updateTaskCount() {
                const total = taskList.querySelectorAll('.task-item').length;
                const done = taskList.querySelectorAll('.task-item.done').length;
                const pending = total - done;
                taskCount.textContent = pending + '个待完成';
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ 计时器 ============
            function updateDisplay() {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

                if (currentMode === 'work') {
                    timerDisplay.classList.remove('break-mode');
                    timerLabel.textContent = '专注时间';
                    ringProgress.style.stroke = 'url(#ringGradient)';
                } else {
                    timerDisplay.classList.add('break-mode');
                    timerLabel.textContent = currentMode === 'shortBreak' ? '短休息' : '长休息';
                    ringProgress.style.stroke = 'url(#ringGradientBreak)';
                }
            }

            function updateRing() {
                const offset = CIRCUMFERENCE * (1 - timeLeft / totalSeconds);
                ringProgress.style.strokeDashoffset = offset;
            }

            function setMode(mode) {
                if (isRunning) {
                    pauseTimer();
                }
                currentMode = mode;
                modeTabs.forEach(tab => tab.classList.remove('active'));
                const activeTab = document.querySelector(`.mode-tab[data-mode="${mode}"]`);
                if (activeTab) activeTab.classList.add('active');

                switch (mode) {
                    case 'work':
                        timeLeft = (parseInt(workInput.value) || 25) * 60;
                        break;
                    case 'shortBreak':
                        timeLeft = (parseInt(shortBreakInput.value) || 5) * 60;
                        break;
                    case 'longBreak':
                        timeLeft = (parseInt(longBreakInput.value) || 15) * 60;
                        break;
                }
                totalSeconds = timeLeft;
                updateDisplay();
                updateRing();
                updateStartButtonText();
            }

            function updateStartButtonText() {
                if (isRunning) {
                    btnStart.innerHTML = '⏸ 暂停';
                } else {
                    const prefix = currentMode === 'work' ? '▶ 开始专注' :
                        currentMode === 'shortBreak' ? '▶ 开始休息' : '▶ 开始长休';
                    btnStart.innerHTML = prefix;
                }
            }

            function startTimer() {
                if (isRunning) return;
                isRunning = true;
                updateStartButtonText();
                timerInterval = setInterval(() => {
                    if (timeLeft <= 0) {
                        finishTimer();
                        return;
                    }
                    timeLeft--;
                    updateDisplay();
                    updateRing();
                }, 1000);
            }

            function pauseTimer() {
                isRunning = false;
                clearInterval(timerInterval);
                timerInterval = null;
                updateStartButtonText();
            }

            function resetTimer() {
                pauseTimer();
                switch (currentMode) {
                    case 'work':
                        timeLeft = (parseInt(workInput.value) || 25) * 60;
                        break;
                    case 'shortBreak':
                        timeLeft = (parseInt(shortBreakInput.value) || 5) * 60;
                        break;
                    case 'longBreak':
                        timeLeft = (parseInt(longBreakInput.value) || 15) * 60;
                        break;
                }
                totalSeconds = timeLeft;
                updateDisplay();
                updateRing();
            }

            function skipTimer() {
                pauseTimer();
                finishTimer(true);
            }

            function finishTimer(skipped = false) {
                pauseTimer();
                playAlarmSound();

                if (currentMode === 'work' && !skipped) {
                    pomodorosToday++;
                    totalFocusSeconds += totalSeconds;
                    sessionsTodayCount++;
                    lastActiveDate = getDateString();
                    if (streakDays === 0) streakDays = 1;
                }

                updateStatsUI();
                saveToStorage();
                showToast(
                    skipped ?
                    (currentMode === 'work' ? '⏭ 已跳过番茄钟' : '⏭ 已跳过休息') :
                    (currentMode === 'work' ? '🎉 番茄完成！休息一下吧~' : '☕ 休息结束，继续加油！')
                );

                // 自动切换模式
                if (currentMode === 'work') {
                    // 每4个番茄后长休息
                    if (pomodorosToday > 0 && pomodorosToday % 4 === 0) {
                        setMode('longBreak');
                    } else {
                        setMode('shortBreak');
                    }
                } else {
                    setMode('work');
                }
                // 自动开始新阶段
                setTimeout(() => {
                    startTimer();
                    showToast(currentMode === 'work' ? '🍅 新番茄开始！' : '☕ 休息时间~');
                }, 800);
            }

            function updateStatsUI() {
                pomodorosDoneEl.textContent = pomodorosToday;
                const focusMin = Math.floor(totalFocusSeconds / 60);
                totalFocusTimeEl.textContent = focusMin + '分钟';
                streakCountEl.textContent = streakDays;
                sessionsTodayEl.textContent = sessionsTodayCount;
            }

            // ============ 音效 ============
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
            }

            function playAlarmSound() {
                initAudio();
                if (!audioCtx) return;
                // 播放一个悦耳的提示音序列
                const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.18);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.18 + 0.35);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + i * 0.18);
                    osc.stop(audioCtx.currentTime + i * 0.18 + 0.35);
                });
            }

            function playTickSound() {
                initAudio();
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.12);
            }

            // ============ Toast ============
            let toastTimeout;

            function showToast(message) {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2200);
            }

            // ============ 主题 ============
            function applyThemeFromStorage() {
                const savedTheme = localStorage.getItem('pomodoroTheme') || 'light';
                document.documentElement.setAttribute('data-theme', savedTheme);
                themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            }

            function toggleTheme() {
                const current = document.documentElement.getAttribute('data-theme') || 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('pomodoroTheme', next);
                themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
                playTickSound();
            }

            // ============ 事件监听 ============
            btnStart.addEventListener('click', () => {
                initAudio();
                if (isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });

            btnReset.addEventListener('click', () => {
                resetTimer();
                showToast('🔄 已重置计时器');
            });

            btnSkip.addEventListener('click', () => {
                skipTimer();
            });

            modeTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    setMode(tab.dataset.mode);
                });
            });

            [workInput, shortBreakInput, longBreakInput].forEach(input => {
                input.addEventListener('change', () => {
                    let val = parseInt(input.value);
                    if (isNaN(val) || val < 1) val = 1;
                    if (val > (input === longBreakInput ? 60 : input === workInput ? 60 : 30))
                        val = input === longBreakInput ? 60 : input === workInput ? 60 : 30;
                    input.value = val;
                    if (!isRunning) {
                        resetTimer();
                    }
                    saveToStorage();
                });
            });

            btnAddTask.addEventListener('click', () => {
                const text = taskInput.value.trim();
                if (!text) {
                    showToast('请输入任务内容~');
                    return;
                }
                const li = createTaskElement(text);
                taskList.appendChild(li);
                taskInput.value = '';
                updateTaskCount();
                saveToStorage();
                playTickSound();
                // 滚动到底部
                taskList.scrollTop = taskList.scrollHeight;
            });

            taskInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    btnAddTask.click();
                }
            });

            themeToggle.addEventListener('click', toggleTheme);

            // 空格键快捷暂停/开始
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target === document.body) {
                    e.preventDefault();
                    initAudio();
                    if (isRunning) {
                        pauseTimer();
                    } else {
                        startTimer();
                    }
                }
                if (e.code === 'KeyR' && e.ctrlKey && e.target === document.body) {
                    e.preventDefault();
                    resetTimer();
                    showToast('🔄 已重置');
                }
            });

            // 页面关闭前保存
            window.addEventListener('beforeunload', () => {
                saveToStorage();
            });

            // ============ 启动 ============
            init();
            updateStartButtonText();
            console.log('🍅 番茄时钟已就绪！');
            console.log('   ⌨ 快捷键：空格 = 开始/暂停 | Ctrl+R = 重置');
            console.log('   🎨 点击右上角切换暗色/亮色主题');
        })();
    </script>
</body>
</html>
